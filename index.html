<!DOCTYPE html>
<html>
<head>
    <title>打開deeplink
    </title>

</head>
<body>
    <style>
        .group{
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            margin-bottom: 12px;
        }
        .input{
            width: 80%;
            height: 200px;
            margin: 0 auto;
            
        }
        .btn{
            width: 100px;
            height: 80px;
            margin: 0 auto;
        }
    </style>

<div class="group">
    <textarea class="input" id="restoreURL"></textarea>
    <button class="btn" id="URLbtn">點我複製自動跳轉網址</button> 
    <button class="btn" id="handleURLbtn">點我複製手動跳轉網址</button> 
</div>

<script>
const url = window.location.origin;

const restoreURLinput = document.getElementById('restoreURL');
const URLbtn = document.getElementById('URLbtn');
const handleURLbtn = document.getElementById('handleURLbtn');

URLbtn.addEventListener('click', function(){
    const deeplink = restoreURLinput.value.replace(/\s/g, '');
    if (!deeplink) {
        alert("請輸入 deeplink");
        return;
    }
    // Base64 編碼
    const encoded = btoa(deeplink);
    // 複製 URL
    const jumpURL = `${url}/open_deeplink/autoopen_deeplink.html?token=${encoded}`;
    navigator.clipboard.writeText(jumpURL)
        .then(() => alert("已複製！"))
        .catch(() => alert("複製失敗"));
});

handleURLbtn.addEventListener('click', function(){
    const deeplink = restoreURLinput.value.replace(/\s/g, '');
    if (!deeplink) {
        alert("請輸入 deeplink");
        return;
    }
    // Base64 編碼
    const encoded = btoa(deeplink);
    // 複製 URL
    const jumpURL = `${url}/open_deeplink/btnopen_deeplink.html?token=${encoded}`;
    navigator.clipboard.writeText(jumpURL)
        .then(() => alert("已複製！"))
        .catch(() => alert("複製失敗"));
});
</script>
</body>
</html>
