<!DOCTYPE html>
<html>
<head>
    <title>打開deeplink
    </title>

</head>
<body>
    <style>
        .group{
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            margin-bottom: 12px;
        }
        .input{
            width: 80%;
            height: 200px;
            margin: 0 auto;
            
        }
        .btn{
            width: 100px;
            height: 80px;
            margin: 0 auto;
        }
    </style>

<div class="group">
    <textarea class="input" id="restoreURL"></textarea>
    <button class="btn" id="URLbtn">點我複製網址</button> 
</div>

<script>
const url = window.location.origin;
console.log(url);

const restoreURLinput = document.getElementById('restoreURL');
const URLbtn = document.getElementById('URLbtn');
URLbtn.addEventListener('click', function(){
    const url = window.location.origin;
    console.log(url);
    const deeplink = restoreURLinput.value.replace(/\s/g, '');
    const encoded = encodeURIComponent(deeplink);
    const jumpURL = `${url}/open_deeplink.html?deeplink=${encoded}`;
    console.log(jumpURL)
        navigator.clipboard.writeText(jumpURL)
        .then(() => alert("已複製！"))
        .catch(() => alert("複製失敗"));
});
</script>
</body>
</html>
