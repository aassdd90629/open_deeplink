<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>打開 Deeplink</title>
</head>

<body>
    <style>
        .group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
            padding: 20px;
        }

        .input {
            width: 90%;
            height: 200px;
            margin: 0 auto;
            font-size: 14px;
        }

        .btn {
            width: 160px;
            height: 60px;
            margin: 0 auto;
            cursor: pointer;
        }

        .title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>

    <div class="group">
        <textarea class="input" id="deeplinkBox" readonly></textarea>

        <button class="btn" id="openBtn">點我開啟 APP</button>
    </div>

    <script>
        // 從 URL 取得 Base64 編碼的 token
        const urlParams = new URLSearchParams(window.location.search);
        const encodedToken = urlParams.get("token");

        const deeplinkBox = document.getElementById("deeplinkBox");
        const openBtn = document.getElementById("openBtn");
        
        let deeplinkParam = null;
        
        if (!encodedToken) {
            deeplinkBox.value = "❌ 錯誤：找不到 token";
            openBtn.disabled = true;
        } else {
            try {
                // Base64 解碼
                deeplinkParam = atob(encodedToken);
                deeplinkBox.value = deeplinkParam;
                // 立即跳轉
                window.location.href = deeplinkParam;
                openBtn.addEventListener("click", function () {
                    window.location.href = deeplinkParam;
                });
            } catch (e) {
                deeplinkBox.value = "❌ 錯誤：token 無效";
                openBtn.disabled = true;
            }
        }
    </script>
</body>
</html>
